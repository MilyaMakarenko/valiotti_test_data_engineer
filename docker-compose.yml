services:
  postgres:
    image: postgres:15
    container_name: valiotti
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dbt:
    build: ./dbt
    container_name: valiotti_dbt
    volumes:
      - ./dbt:/usr/app/dbt
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres_valiotti
      DB_USER:  ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: 5432
    command: ["tail", "-f", "/dev/null"]

volumes:
  postgres_valiotti: